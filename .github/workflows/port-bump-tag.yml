name: port-bump-tag

# Invoked by Port's "Bump image tag" self-service action.
# Opens a PR that edits charts/<service>/values.yaml → image.tag.
# Status is reported back to the Port run so the UI shows green/red end-to-end.

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service identifier (matches the Service blueprint entity)'
        required: true
        type: string
      chart_path:
        description: 'Path to the chart (defaults to charts/<service>)'
        required: false
        type: string
        default: ''
      tag:
        description: 'New image tag'
        required: true
        type: string
      auto_sync:
        description: 'Trigger argocd app sync after merge'
        required: false
        type: boolean
        default: true
      port_context:
        description: 'Port run context (run_id, entity, blueprint, triggered_by)'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve chart path
        id: paths
        run: |
          CHART_PATH="${{ inputs.chart_path }}"
          if [ -z "$CHART_PATH" ]; then
            CHART_PATH="charts/${{ inputs.service }}"
          fi
          if [ ! -f "$CHART_PATH/values.yaml" ]; then
            echo "::error::values.yaml not found at $CHART_PATH"
            exit 1
          fi
          echo "chart_path=$CHART_PATH" >> "$GITHUB_OUTPUT"
          echo "branch=port/bump-${{ inputs.service }}-${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Report in-progress to Port
        if: ${{ fromJSON(inputs.port_context).run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJSON(inputs.port_context).run_id }}
          logMessage: 'Editing ${{ steps.paths.outputs.chart_path }}/values.yaml → image.tag: ${{ inputs.tag }}'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Edit values.yaml
        run: |
          yq -i '.image.tag = "${{ inputs.tag }}"' "${{ steps.paths.outputs.chart_path }}/values.yaml"
          git diff -- "${{ steps.paths.outputs.chart_path }}/values.yaml"

      - name: Open PR
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.paths.outputs.branch }}
          commit-message: |
            chore(${{ inputs.service }}): bump image tag to ${{ inputs.tag }}

            Triggered via Port self-service by ${{ fromJSON(inputs.port_context).triggered_by }}
            Port run: ${{ fromJSON(inputs.port_context).run_id }}
          title: 'chore(${{ inputs.service }}): bump image tag to ${{ inputs.tag }}'
          body: |
            Self-service bump opened via Port.

            - **Service:** `${{ inputs.service }}`
            - **New tag:** `${{ inputs.tag }}`
            - **Chart:** `${{ steps.paths.outputs.chart_path }}`
            - **Triggered by:** ${{ fromJSON(inputs.port_context).triggered_by }}
            - **Port run:** `${{ fromJSON(inputs.port_context).run_id }}`

            Merging this PR causes ArgoCD to reconcile the workload on its next poll (~3min).
          labels: port,gitops,automated

      - name: Report success to Port
        if: ${{ always() && fromJSON(inputs.port_context).run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJSON(inputs.port_context).run_id }}
          status: ${{ job.status == 'success' && 'SUCCESS' || 'FAILURE' }}
          logMessage: "${{ steps.pr.outputs.pull-request-url && format('PR opened {0}', steps.pr.outputs.pull-request-url) || 'No PR opened (values may already be at this tag).' }}"
          link: ${{ steps.pr.outputs.pull-request-url }}
