name: port-rollback

# Invoked by Port's "Roll back to previous tag" action.
# `git revert`s the most recent commit touching <chart_path>/values.yaml.
# Auditable, undoable, and goes through the same PR review as a normal change.

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service identifier'
        required: true
        type: string
      chart_path:
        description: 'Chart path (defaults to charts/<service>)'
        required: false
        type: string
        default: ''
      reason:
        description: 'Reason for rollback'
        required: true
        type: string
      port_context:
        description: 'Port run context'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write
  pull-requests: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to locate the previous values.yaml commit

      - name: Resolve chart path
        id: paths
        run: |
          CHART_PATH="${{ inputs.chart_path }}"
          if [ -z "$CHART_PATH" ]; then
            CHART_PATH="charts/${{ inputs.service }}"
          fi
          echo "chart_path=$CHART_PATH" >> "$GITHUB_OUTPUT"

      - name: Find last values.yaml change
        id: last
        run: |
          SHA=$(git log -n 1 --format=%H -- "${{ steps.paths.outputs.chart_path }}/values.yaml")
          if [ -z "$SHA" ]; then
            echo "::error::No prior commits touch ${{ steps.paths.outputs.chart_path }}/values.yaml"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short "$SHA")" >> "$GITHUB_OUTPUT"

      - name: Revert
        run: |
          git config user.name 'port-bot'
          git config user.email 'port-bot@users.noreply.github.com'
          git checkout -b "port/rollback-${{ inputs.service }}-${{ steps.last.outputs.short }}"
          git revert --no-edit "${{ steps.last.outputs.sha }}"

      - name: Push + open PR
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: port/rollback-${{ inputs.service }}-${{ steps.last.outputs.short }}
          title: 'revert(${{ inputs.service }}): rollback ${{ steps.last.outputs.short }}'
          body: |
            Self-service rollback opened via Port.

            - **Service:** `${{ inputs.service }}`
            - **Reverts:** ${{ steps.last.outputs.sha }}
            - **Reason:** ${{ inputs.reason }}
            - **Triggered by:** ${{ fromJSON(inputs.port_context).triggered_by }}

            Merging restores the prior `image.tag` and ArgoCD reconciles within ~3 minutes.
          labels: port,rollback,automated

      - name: Report to Port
        if: ${{ always() && fromJSON(inputs.port_context).run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJSON(inputs.port_context).run_id }}
          status: ${{ job.status == 'success' && 'SUCCESS' || 'FAILURE' }}
          link: ${{ steps.pr.outputs.pull-request-url }}
