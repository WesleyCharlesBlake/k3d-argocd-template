# Port Ocean — GitHub integration.
#
# Pulls GitHub repositories, pull requests, workflows, and teams into the Port
# catalog. Complements port-k8s-exporter (which covers in-cluster state): the
# pair gives Port a view of "where is this service's code + history" *and*
# "where is it running + healthy."
#
# Gated on two Secrets in the `tooling` namespace:
#   - port-credentials       (PORT_CLIENT_ID, PORT_CLIENT_SECRET)
#   - github-ocean-secrets   (githubToken — a PAT with read access)
#
# Both are created by `make port-bootstrap` (which now also picks up
# $GITHUB_PAT, the same env var ArgoCD's repo creds use).
#
# Sync wave -2: same as the K8s exporter — independent of workload sync waves.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: port-ocean-github
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://port-labs.github.io/helm-charts
    chart: port-ocean
    targetRevision: 0.17.0
    helm:
      releaseName: port-ocean-github
      values: |
        # The chart's own Secret is disabled — we bring our own via the two
        # existing Secrets (`port-credentials`, `github-ocean-secrets`). All
        # creds enter the pod as direct `env:` entries with `secretKeyRef`,
        # which is the universal escape hatch and avoids the chart's
        # `required ... | b64enc` template guard.
        secret:
          create: false
          name: ""

        port:
          # baseUrl is the only non-secret port.* setting that needs to be
          # the .io domain (not .getport.io, which redirects).
          baseUrl: https://api.port.io
          # clientId / clientSecret intentionally unset — see extraEnv below.

        # extraEnv beats envFrom for matching names, and our env var names
        # exactly match what the Ocean framework reads:
        #   OCEAN__PORT__CLIENT_ID / _SECRET           — port.clientId/Secret
        #   OCEAN__INTEGRATION__CONFIG__GITHUB_TOKEN   — integration.secrets.githubToken
        extraEnv:
          - name: OCEAN__PORT__CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: port-credentials
                key: PORT_CLIENT_ID
          - name: OCEAN__PORT__CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: port-credentials
                key: PORT_CLIENT_SECRET
          - name: OCEAN__INTEGRATION__CONFIG__GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-ocean-secrets
                key: githubToken

        integration:
          identifier: github-ocean
          type: github-ocean
          eventListener:
            # POLLING is fine for local — production would use KAFKA or
            # webhooks for sub-minute latency.
            type: POLLING
          config:
            # api.github.com for GitHub Cloud; swap for your Enterprise host.
            githubHost: https://api.github.com
          # secrets intentionally left empty: githubToken is injected via
          # extraEnv above so the PAT lives only in the K8s Secret, never
          # in the chart's own Secret (which would be in the rendered
          # Application CR).

        # createDefaultResources=false: blueprints/actions/scorecards live
        # under port/ as IaC, same as the K8s exporter.
        initializePortResources: false
        sendRawDataExamples: false
        scheduledResyncInterval: 360

        resources:
          requests: { cpu: 50m, memory: 100Mi }
          limits:   { cpu: 200m, memory: 256Mi }

  destination:
    server: https://kubernetes.default.svc
    namespace: tooling

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
